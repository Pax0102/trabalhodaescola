<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hugo's Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#0b1020;color:white;font-family:Arial}
.topbar{min-height:118px;padding:22px 18px 18px;background:#111827;position:relative}
.menu{display:flex;gap:8px;padding:12px}
.pill{padding:10px 14px;border:none;border-radius:999px;background:#222;color:#fff}
.pill.active{background:#3b82f6}
.cards{padding:16px;display:grid;gap:12px}
.card{background:#1f2937;padding:16px;border-radius:16px;cursor:pointer}
#gameScreen{display:none;position:fixed;inset:0;background:#000}
#gameFrame{width:100%;height:100%;border:none}
#backBtn{position:fixed;top:12px;left:12px;width:52px;height:52px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:white;font-size:28px}
</style>
</head>
<body>
<div id="homeScreen">
<header class="topbar">
<h1>Arcade Games</h1>
<p>Escolha um jogo e toque para abrir dentro do app.</p>
</header>

<nav class="menu">
<button class="pill active" onclick="filterGames('todos',this)">🔥 Todos</button>
<button class="pill" onclick="filterGames('acao',this)">🏹 Ação</button>
<button class="pill" onclick="filterGames('corrida',this)">🚗 Corrida</button>
<button class="pill" onclick="filterGames('casual',this)">💘 Casual</button>
</nav>

<main class="cards">
<div class="card" data-category="acao">Ragdoll Archers</div>
<div class="card" data-category="acao">Gun Spin</div>
<div class="card" data-category="corrida">Wheelie Bike</div>
<div class="card" data-category="corrida">Escape Car</div>
<div class="card" data-category="casual">Love Tester</div>
</main>
</div>

<div id="gameScreen">
<button id="backBtn" onclick="goHome()">‹</button>
<iframe id="gameFrame"></iframe>
</div>

<script>
function goHome(){
document.getElementById("gameScreen").style.display="none";
document.getElementById("homeScreen").style.display="block";
}
function filterGames(category,btn){
document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
btn.classList.add("active");
document.querySelectorAll(".card").forEach(card=>{
card.style.display=(category==="todos"||card.dataset.category===category)?"block":"none";
});
}
</script>
</body>
</html>
