<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}

html,body{
  width:100%;
  min-height:100%;
  background:linear-gradient(145deg,#0f0f0f,#1a1a1a);
  color:white;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

body::-webkit-scrollbar{width:0;background:transparent}

header{
  height:92px;
  width:100%;
  display:flex;
  align-items:center;
  padding:0 18px;
  background:#0c0c0cd3;
  border-bottom:3px solid #3b82f6;
}

.tituloInicio{font-size:1rem;color:#d4d4d8;margin:0}
.tituloInicio2{font-size:1.25rem;color:#fff;margin:0}

.menu{
  position:fixed;
  top:10px;
  right:10px;
  display:flex;
  gap:4px;
  padding:4px;
  background:rgba(30,30,30,.72);
  backdrop-filter:blur(18px);
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  z-index:9999;
}

.link{
  position:relative;
  width:38px;
  height:38px;
  border-radius:14px;
  text-decoration:none;
  color:#d4d4d8;
  overflow:hidden;
  transition:.25s;
}

.link .icon,.link .label{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  transition:.25s;
}

.link .icon{
  left:50%;
  transform:translate(-50%,-50%);
}

.link .label{
  display:none;
}

.link.active{
  background:rgba(59,130,246,.25);
  box-shadow:0 0 12px rgba(59,130,246,.5);
}

.cards{
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
  padding:18px;
  width:100%;
  max-width:520px;
  margin:0 auto;
}

.card-link{text-decoration:none;color:inherit}

.card{
  width:100%;
  min-height:auto;
  background:rgba(30,30,30,.55);
  backdrop-filter:blur(12px);
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 10px 28px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05);
  transition:.25s;
  cursor:pointer;
}

.card:active{
  transform:scale(.98);
}

.card img{
  width:100%;
  height:135px;
  object-fit:cover;
}

.card-content{
  padding:15px;
  color:#e4e4e7;
}

.card-content h2{
  font-size:1.25rem;
  margin-bottom:6px;
}

.card-content p{
  font-size:.9rem;
  line-height:1.35rem;
  color:#d4d4d8;
}

.separator{
  display:flex;
  align-items:center;
  text-align:center;
  margin:12px 0;
  color:#9ca3af;
  font-size:12px;
}

.separator:before,.separator:after{
  content:"";
  flex:1;
  border-bottom:1px solid rgba(255,255,255,.2);
}

.separator:before{margin-right:8px}
.separator:after{margin-left:8px}

.moto-menu{
  max-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:8px;
  transition:.35s;
  padding:0 15px;
}

.moto-menu.open{
  max-height:220px;
  padding-bottom:15px;
}

.moto-option{
  background:rgba(30,30,30,.65);
  border:1px solid rgba(255,255,255,.08);
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:#d4d4d8;
  font-size:14px;
}

footer{
  background:rgba(12,12,12,.85);
  border-top:3px solid #3b82f6;
  margin-top:20px;
}

.footer-container{
  padding:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.footer-text{
  color:#9ca3af;
  font-size:12px;
}
</style>
